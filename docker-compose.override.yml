# Dev overrides: mounts local backend code with hot-reload, skips frontend build.
# Active by default (docker compose reads this automatically).
# For production, use: docker compose -f docker-compose.yml up
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app/backend
      - ./ingestion/data:/app/ingestion/data
      - backend_data:/app/backend/data
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - "8001:8001"

  frontend:
    profiles:
      - production
