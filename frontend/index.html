<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>UrbanLayer — Site Feasibility for Any Chicago Address</title>
    <meta
      name="description"
      content="Type any Chicago address and get its zoning, what you can build, tax projection, incentives, and regulatory overlays in seconds — free, no account. Ask follow-ups with cited municipal code and download a $25 Development Feasibility Report."
    />
    <link rel="canonical" href="https://urbanlayerchicago.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UrbanLayer" />
    <meta property="og:title" content="UrbanLayer — Site Feasibility for Any Chicago Address" />
    <meta
      property="og:description"
      content="Zoning, buildable envelope, tax projection, incentives, and comparable sales for any Chicago parcel — in seconds, free, no account."
    />
    <meta property="og:url" content="https://urbanlayerchicago.com/" />
    <meta property="og:image" content="https://urbanlayerchicago.com/sample-report-thumb.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UrbanLayer — Site Feasibility for Any Chicago Address" />
    <meta
      name="twitter:description"
      content="Zoning, buildable envelope, tax projection, incentives, and comparable sales for any Chicago parcel — in seconds, free, no account."
    />
    <meta name="twitter:image" content="https://urbanlayerchicago.com/sample-report-thumb.png" />
    <!-- Pre-paint theme resolution (no FOUC): set data-theme before the bundle loads, and
         paint the correct background via a pre-resolved var. See guides/light-dark-theming.md. -->
    <style>
      html { --_pp: #0a0a0a; }
      html[data-theme="light"] { --_pp: #fafaf9; }
      html, body { background: var(--_pp); }
    </style>
    <script>
      (function () {
        try {
          var p = localStorage.getItem('urbanlayer-theme') || 'system';
          var dark = p === 'dark' || (p !== 'light' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body class="bg-dark-bg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
