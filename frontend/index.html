<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>UrbanLayer — Chicago</title>
    <!-- Pre-paint theme resolution (no FOUC): set data-theme before the bundle loads, and
         paint the correct background via a pre-resolved var. See guides/light-dark-theming.md. -->
    <style>
      html { --_pp: #0a0a0a; }
      html[data-theme="light"] { --_pp: #fafaf9; }
      html, body { background: var(--_pp); }
    </style>
    <script>
      (function () {
        try {
          var p = localStorage.getItem('urbanlayer-theme') || 'system';
          var dark = p === 'dark' || (p !== 'light' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body class="bg-dark-bg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
