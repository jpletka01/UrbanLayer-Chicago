server {
    listen 80;
    server_name urbanlayerchicago.com www.urbanlayerchicago.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name urbanlayerchicago.com www.urbanlayerchicago.com;

    # Cloudflare Origin Certificate (Full Strict mode)
    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: https://static.cloudflareinsights.com; worker-src blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.mapbox.com https://images.unsplash.com https://lh3.googleusercontent.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.mapbox.com https://api.mapbox.com https://events.mapbox.com https://*.ingest.de.sentry.io; frame-ancestors 'none'" always;

    # --- Gzip ---
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # --- Static files ---

    # Hashed assets — long-lived cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # index.html — never cache (add_header in child blocks overrides server-level headers)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: https://static.cloudflareinsights.com; worker-src blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.mapbox.com https://images.unsplash.com https://lh3.googleusercontent.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.mapbox.com https://api.mapbox.com https://events.mapbox.com https://*.ingest.de.sentry.io; frame-ancestors 'none'" always;
    }

    # --- Backend proxy ---

    # PDF feasibility report: generation runs an isolated WeasyPrint render that
    # can take longer than the 60s nginx default. Give it a dedicated 180s read
    # timeout (the backend's own render budget is 150s, so the app errors cleanly
    # before this) while keeping the rest of /api/ snappy at the default.
    location = /api/report {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        client_max_body_size 16m;
    }

    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 16m;
    }

    # SSE chat endpoint
    location /chat {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        client_max_body_size 16m;
    }

    # Other backend endpoints
    location /health {
        proxy_pass http://backend:8001;
    }

    location /autocomplete {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
    }

    location /section/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
