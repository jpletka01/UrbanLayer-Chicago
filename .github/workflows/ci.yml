name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.prod.txt -r requirements.test.txt

      - name: Run backend tests
        run: python -m pytest backend/tests/ -q -m "not integration"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

      - name: Frontend build
        run: cd frontend && npm run build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/urbanlayer
            git fetch origin
            git merge origin/main
            # set -e above makes a failed --build fail the deploy. Without it, a broken
            # build left the OLD image running and the health curl still passed → a
            # false-success deploy (hit 2026-06-18: a committed data artifact was missing
            # from .dockerignore's allowlist, so its COPY failed but CI reported green).
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            sleep 10
            curl -sf https://urbanlayerchicago.com/health
