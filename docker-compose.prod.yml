services:
  backend:
    environment:
      # Disabled 2026-06-16: a single reranked semantic_search hangs >40-60s on this
      # box regardless of torch thread count (tested 4 AND 1 — capping to 1 made it
      # WORSE, so it is NOT thread oversubscription as first guessed). The report
      # fires 5 of these in parallel → /api/report hangs past 180s → 504. Curiously a
      # direct reranker.predict(4 pairs) is 0.3s, so the slowness is in the rerank
      # path over reranker_candidate_count pairs (or its executor interaction), not
      # raw inference — needs profiling (candidate_count, run_in_executor, batching)
      # before re-enabling. With it off, semantic_search is 0.2-1.4s, reports ~10s.
      - RERANKER_ENABLED=false
      # Cap glibc arenas (reduces per-thread arena VM/fragmentation). NOTE: neither
      # this nor the per-report malloc_trim() flattened the parent's ~20 MB/render
      # RSS creep (measured 2026-06-16) — that growth is evidently live caches, not
      # reclaimable free space. Both kept as cheap, harmless mitigations; the creep
      # is benign (ample headroom + 8 GB swap, decelerates, worker restarts each
      # deploy). Revisit only if RSS fails to plateau over days.
      - MALLOC_ARENA_MAX=2
      # Enabled 2026-06-22: second authoritative address→PIN source (Assessor Parcel
      # Addresses 3723-97qp) for parcels absent from Address Points (78yw-iddh) —
      # closes ~half of the ~25% of Chicago addresses that degraded to "approximate".
      # Code default is OFF; prod opts in here (revert by removing this line). Gated
      # pre-enable on: 55/55 agreement w/ Address Points, 20/20 independent geocode
      # spot-check, 5 live integration tests. See audits/2026-06-22_gis-parcel-resolution-fix.md.
      - ASSESSOR_ADDRESS_RESOLUTION_ENABLED=true

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        VITE_API_BASE: ""
        NGINX_CONF: nginx.prod.conf
        # Microsoft Clarity session replay (validation window, disclosed on
        # /privacy). The ID is public — it ships in every page's HTML anyway.
        VITE_CLARITY_ID: ${VITE_CLARITY_ID:-xhsx626r62}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare:/etc/nginx/ssl:ro
