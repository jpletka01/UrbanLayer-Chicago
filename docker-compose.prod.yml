services:
  backend:
    environment:
      # Disabled 2026-06-16: bge-reranker-v2-m3 cross-encoder inference hangs/crawls
      # (>40s per semantic_search) on this box, and the report's extract_zoning_standards
      # fires 5 reranked searches in parallel → /api/report hangs past 180s → 504. With
      # the reranker off, semantic_search is 0.2–1.4s and the report renders. Re-enable
      # only after the reranker hang is root-caused (torch thread/CPU contention suspected).
      - RERANKER_ENABLED=false

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        VITE_API_BASE: ""
        NGINX_CONF: nginx.prod.conf
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare:/etc/nginx/ssl:ro
