services:
  backend:
    environment:
      # Disabled 2026-06-16: report's extract_zoning_standards fires 5 reranked
      # semantic_searches in parallel; with torch at 4 threads on this 4-core box
      # that oversubscribes (~20 threads) and each rerank crawls → /api/report
      # hangs past the 180s ceiling → 504. (Reranker inference itself is fine —
      # predict(4 pairs)=0.3s — it's the thread contention under parallel load.)
      # Re-enable only after capping torch threads (set_num_threads(1)/
      # OMP_NUM_THREADS=1) and/or serializing the 5 searches. With it off,
      # semantic_search is 0.2–1.4s and reports render in ~10s.
      - RERANKER_ENABLED=false
      # Cap glibc arenas to bound per-request memory retained by the parent's
      # matplotlib/HTML work (measured RSS crept ~17 MB/render); keeps the
      # long-lived worker's footprint flat on the 8 GB box.
      - MALLOC_ARENA_MAX=2

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        VITE_API_BASE: ""
        NGINX_CONF: nginx.prod.conf
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare:/etc/nginx/ssl:ro
