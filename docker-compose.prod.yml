services:
  backend:
    environment:
      # Re-enabled 2026-06-16 after capping torch intra-op threads to 1 in
      # vector_search._cap_torch_threads(). The report fires 5 reranked searches in
      # parallel; at torch's default 4 threads on this 4-core box that oversubscribed
      # (~20 threads), thrashed, and hung /api/report past 180s → 504. Pinning torch
      # to 1 thread keeps total threads ≈ concurrency. (Reranker inference itself was
      # always fine — predict(4 pairs)=0.3s.) If reports hang again, set this back to
      # false (the documented escape valve).
      - RERANKER_ENABLED=true
      # Cap glibc arenas (reduces per-thread arena VM/fragmentation). NOTE: this does
      # NOT return freed memory to the OS, so on its own it did not flatten the parent
      # RSS creep (~20 MB/render from matplotlib/HTML work) — the actual lever for
      # that is the per-report malloc_trim() in the /api/report handler.
      - MALLOC_ARENA_MAX=2

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        VITE_API_BASE: ""
        NGINX_CONF: nginx.prod.conf
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare:/etc/nginx/ssl:ro
